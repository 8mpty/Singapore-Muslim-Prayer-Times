name: Process Prayer Times Data

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Timetable Year'
        required: true
        type: string
      download_link:
        description: 'Download link for timetable (CSV Format Only)'
        required: true
        type: string
      parent_link:
        description: 'Parent dataset link (e.g. https://data.gov.sg/datasets/d_xxx/view)'
        required: true
        type: string

jobs:
  process-prayer-times:
    runs-on: ubuntu-latest

    env:
      BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
      BOT_EMAIL: ${{ secrets.BOT_EMAIL }}
      WEB_BUILD: ${{ secrets.WEB_BUILD }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.5'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/req
    
    - name: Create necessary directories
      run: |
        mkdir -p raw
        mkdir -p ${{ github.event.inputs.year }}/csv
        mkdir -p ${{ github.event.inputs.year }}/json
    
    - name: Download CSV file
      run: |
        echo "Downloading file from provided link..."
        curl -L -o "raw/MuslimPrayerTimetable${{ github.event.inputs.year }}.csv" "${{ github.event.inputs.download_link }}"
        echo "Downloaded file: raw/MuslimPrayerTimetable${{ github.event.inputs.year }}.csv"
    
    - name: Run CSV formatter
      run: |
        echo "Running CSV formatter"
        cd scripts
        python csv-formatter.py ${{ github.event.inputs.year }}
    
    - name: Run CSV to JSON converter
      run: |
        echo "Converting CSV to JSON"
        cd scripts
        python csv-to-json.py ${{ github.event.inputs.year }}
    
    - name: Verify generated files
      run: |
        echo "Verifying generated files"
        ls -la ${{ github.event.inputs.year }}/csv/
        ls -la ${{ github.event.inputs.year }}/json/
        echo "Files generated successfully"
    
    - name: Update README.md
      run: |
        echo "Updating README.md with citation for ${{ github.event.inputs.year }}..."
        cd scripts
        python readme-updater.py ${{ github.event.inputs.year }} "${{ github.event.inputs.parent_link }}"
    
    - name: Commit and push changes to main branch
      run: |
        git config --local user.name "${BOT_USERNAME}"
        git config --local user.email "${BOT_EMAIL}"
        git add raw/
        git add ${{ github.event.inputs.year }}/
        git add README.md
        git diff --quiet && git diff --staged --quiet || git commit -m "Add prayer times data for ${{ github.event.inputs.year }}"
        git push origin main
    
    - name: Sync to WEB_BUILD branch
      run: |
        git config --local user.name "${BOT_USERNAME}"
        git config --local user.email "${BOT_EMAIL}"

        echo "Syncing year folders to ${WEB_BUILD} branch"
        
        if git ls-remote --heads origin ${WEB_BUILD} | grep -q ${WEB_BUILD}; then
          echo "Branch ${WEB_BUILD} exists, checking it out"
          git fetch origin ${WEB_BUILD}
          git checkout ${WEB_BUILD}
        else
          echo "Branch ${WEB_BUILD} does not exist, creating it"
          git checkout --orphan ${WEB_BUILD}
          git rm -rf . > /dev/null 2>&1 || true
        fi
        
        echo "Copying year folders from main branch"
        git checkout main -- [0-9][0-9][0-9][0-9]/
        
        echo "Cleaning up unwanted files..."
        rm -rf scripts .github README.md raw .gitignore 2>/dev/null || true
        
        echo "Final structure:"
        ls -la
        
        if git diff --quiet && git diff --staged --quiet; then
          echo "No changes to commit in ${WEB_BUILD} branch"
        else
          git add .
          git commit -m "Update year folders for ${{ github.event.inputs.year }}"
          git push origin ${WEB_BUILD}
          echo "Successfully updated ${WEB_BUILD} branch"
        fi